<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Détail Patient — GestionCabinet')}">
    <title></title>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div th:replace="~{fragments/layout :: sidebar(${currentPage})}"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content" style="margin-top:56px;">
        <div class="page-header d-flex flex-wrap align-items-center justify-content-between gap-3">
            <h2><i class="fa-solid fa-user me-2"></i>Fiche Patient</h2>
            <div class="d-flex gap-2">
                <a th:href="@{/patients/edit/{id}(id=${patient.id})}" class="btn btn-warning">
                    <i class="fa-solid fa-pen me-1"></i> Modifier
                </a>
                <a th:href="@{/patients}" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-arrow-left me-1"></i> Retour
                </a>
            </div>
        </div>
        <div class="detail-card mb-4">
            <div class="row">
                <div class="col-md-6 col-lg-4">
                    <div class="detail-label">Nom</div>
                    <div class="detail-value" th:text="${patient.nom}"></div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="detail-label">Prénom</div>
                    <div class="detail-value" th:text="${patient.prenom}"></div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="detail-label">Sexe</div>
                    <div class="detail-value">
                        <span class="badge badge-sexe"
                              th:classappend="${patient.sexe?.name() == 'Homme'} ? 'bg-primary' : 'bg-danger'"
                              th:text="${patient.sexe}"></span>
                    </div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="detail-label">Email</div>
                    <div class="detail-value" th:text="${patient.email}"></div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="detail-label">Téléphone</div>
                    <div class="detail-value" th:text="${patient.telephone}"></div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="detail-label">Date de naissance</div>
                    <div class="detail-value" th:text="${patient.dateNaissance != null} ? ${#temporals.format(patient.dateNaissance, 'dd/MM/yyyy')} : '—'"></div>
                </div>
                <div class="col-12">
                    <div class="detail-label">Adresse</div>
                    <div class="detail-value" th:text="${patient.adresse} ?: '—'"></div>
                </div>
            </div>
        </div>
        <div class="table-container">
            <h5 class="mb-3"><i class="fa-solid fa-stethoscope me-2"></i>Historique des consultations</h5>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${consultations}">
                            <td th:text="${#temporals.format(c.date, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${c.description}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(consultations)}">
                            <td colspan="2" class="text-center text-muted py-4">Aucune consultation pour ce patient</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
