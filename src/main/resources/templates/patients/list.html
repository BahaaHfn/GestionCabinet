<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Patients — GestionCabinet')}">
    <title></title>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div th:replace="~{fragments/layout :: sidebar(${currentPage})}"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content" style="margin-top:56px;">
        <!-- Page Header -->
        <div class="page-header d-flex flex-wrap align-items-center justify-content-between gap-3">
            <h2><i class="fa-solid fa-users me-2"></i>Patients</h2>
            <a th:href="@{/patients/new}" class="btn btn-primary">
                <i class="fa-solid fa-plus me-1"></i> Ajouter un patient
            </a>
        </div>

        <!-- Search -->
        <div class="table-container">
            <form th:action="@{/patients}" method="get" class="d-flex search-bar mb-3">
                <label>
                    <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="Rechercher par nom ou prénom...">
                </label>
                <button class="btn btn-primary" type="submit"><i class="fa-solid fa-search"></i></button>
            </form>

            <!-- Table -->
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Email</th>
                            <th>Téléphone</th>
                            <th>Sexe</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${patients}">
                            <td th:text="${p.nom}"></td>
                            <td th:text="${p.prenom}"></td>
                            <td th:text="${p.email}"></td>
                            <td th:text="${p.telephone}"></td>
                            <td>
                                <span class="badge badge-sexe"
                                      th:classappend="${p.sexe?.name() == 'Homme'} ? 'bg-primary' : 'bg-danger'"
                                      th:text="${p.sexe}"></span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/patients/{id}(id=${p.id})}" class="btn btn-info btn-action" title="Voir">
                                    <i class="fa-solid fa-eye text-white"></i>
                                </a>
                                <a th:href="@{/patients/edit/{id}(id=${p.id})}" class="btn btn-warning btn-action" title="Modifier">
                                    <i class="fa-solid fa-pen text-white"></i>
                                </a>
                                <a th:href="@{/patients/delete/{id}(id=${p.id})}" class="btn btn-danger btn-action"
                                   title="Supprimer" onclick="return confirm('Supprimer ce patient ?')">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(patients)}">
                            <td colspan="6" class="text-center text-muted py-4">Aucun patient trouvé</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <nav th:if="${totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${currentPageNum == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/patients(keyword=${keyword}, page=${currentPageNum - 1}, size=${size})}">
                            <i class="fa-solid fa-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPageNum} ? 'active'">
                        <a class="page-link" th:href="@{/patients(keyword=${keyword}, page=${i}, size=${size})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPageNum == totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/patients(keyword=${keyword}, page=${currentPageNum + 1}, size=${size})}">
                            <i class="fa-solid fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
