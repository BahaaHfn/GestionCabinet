<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Formulaire Patient — GestionCabinet')}">
    <title></title></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div th:replace="~{fragments/layout :: sidebar(${currentPage})}"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content" style="margin-top:56px;">
        <div class="page-header">
            <h2>
                <i class="fa-solid fa-user-plus me-2" th:if="${patient.id == 0}"></i>
                <i class="fa-solid fa-user-pen me-2" th:if="${patient.id != 0}"></i>
                <span th:text="${patient.id == 0} ? 'Ajouter un patient' : 'Modifier un patient'"></span>
            </h2>
        </div>

        <div class="form-container" style="max-width:700px;">
            <form th:action="${patient.id == 0} ? '/patients' : '/patients/update'"
                  th:object="${patient}" method="post">

                <input type="hidden" th:field="*{id}" />

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="nom" class="form-label">Nom</label>
                        <input type="text" class="form-control" id="nom" th:field="*{nom}" required />
                    </div>
                    <div class="col-md-6">
                        <label for="prenom" class="form-label">Prénom</label>
                        <input type="text" class="form-control" id="prenom" th:field="*{prenom}" required />
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}" required />
                    </div>
                    <div class="col-md-6">
                        <label for="telephone" class="form-label">Téléphone</label>
                        <input type="text" class="form-control" id="telephone" th:field="*{telephone}" required />
                    </div>
                    <div class="col-12">
                        <label for="adresse" class="form-label">Adresse</label>
                        <input type="text" class="form-control" id="adresse" th:field="*{adresse}" />
                    </div>
                    <div class="col-md-6">
                        <label for="dateNaissance" class="form-label">Date de naissance</label>
                        <input type="date" class="form-control" id="dateNaissance" th:field="*{dateNaissance}" />
                    </div>
                    <div class="col-md-6">
                        <label for="sexe" class="form-label">Sexe</label>
                        <select class="form-select" id="sexe" th:field="*{sexe}">
                            <option value="">-- Choisir --</option>
                            <option th:each="s : ${sexes}" th:value="${s}" th:text="${s}"></option>
                        </select>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-check me-1"></i> Enregistrer
                    </button>
                    <a th:href="@{/patients}" class="btn btn-outline-secondary">
                        <i class="fa-solid fa-xmark me-1"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
