<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Patient</title>
</head>
<body>
    <h1 th:text="${patient.id == 0} ? 'Ajouter un patient' : 'Modifier un patient'"></h1>

    <form th:action="${patient.id == 0} ? @{/patients} : @{/patients/update}"
          th:object="${patient}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div>
            <label for="nom">Nom :</label>
            <input type="text" id="nom" th:field="*{nom}" required />
        </div>
        <div>
            <label for="prenom">Prénom :</label>
            <input type="text" id="prenom" th:field="*{prenom}" required />
        </div>
        <div>
            <label for="email">Email :</label>
            <input type="email" id="email" th:field="*{email}" required />
        </div>
        <div>
            <label for="telephone">Téléphone :</label>
            <input type="text" id="telephone" th:field="*{telephone}" required />
        </div>
        <div>
            <label for="adresse">Adresse :</label>
            <input type="text" id="adresse" th:field="*{adresse}" />
        </div>
        <div>
            <label for="dateNaissance">Date de naissance :</label>
            <input type="date" id="dateNaissance" th:field="*{dateNaissance}" />
        </div>
        <div>
            <label for="sexe">Sexe :</label>
            <select id="sexe" th:field="*{sexe}">
                <option value="">-- Choisir --</option>
                <option th:each="s : ${sexes}" th:value="${s}" th:text="${s}"></option>
            </select>
        </div>

        <br/>
        <button type="submit">Enregistrer</button>
        <a th:href="@{/patients}">Annuler</a>
    </form>
</body>
</html>
