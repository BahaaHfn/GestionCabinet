<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">GestionCabinet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="fa-solid fa-hospital"></i> GestionCabinet
        </a>
        <button class="navbar-toggler border-0" type="button" id="sidebarToggle">
            <span class="navbar-toggler-icon"></span>
        </button>
    </div>
</nav>
<div th:fragment="sidebar(currentPage)" id="sidebar" class="sidebar">
    <nav class="nav flex-column">
        <a class="nav-link" th:classappend="${currentPage == 'dashboard'} ? 'active'" th:href="@{/}">
            <i class="fa-solid fa-house"></i> Dashboard
        </a>
        <a class="nav-link" th:classappend="${currentPage == 'patients'} ? 'active'" th:href="@{/patients}">
            <i class="fa-solid fa-users"></i> Patients
        </a>
        <a class="nav-link" th:classappend="${currentPage == 'consultations'} ? 'active'" th:href="@{/consultations}">
            <i class="fa-solid fa-stethoscope"></i> Consultations
        </a>
    </nav>
</div>
<footer th:fragment="footer" class="footer">
    &copy; 2026 GestionCabinet — Tous droits réservés
</footer>
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', function() {
                sidebar.classList.toggle('show');
                if (overlay) overlay.classList.toggle('show');
            });
        }
        if (overlay) {
            overlay.addEventListener('click', function() {
                sidebar.classList.remove('show');
                overlay.classList.remove('show');
            });
        }
    </script>
</div>

</body>
</html>
